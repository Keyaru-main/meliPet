name: Fetch Content

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to fetch'
        required: true
      branch_name:
        description: 'Temporary branch name'
        required: true
      file_type:
        description: 'Type: web or file'
        required: false
        default: 'web'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch content
        run: |
          set -e
          mkdir -p fetched

          URL="${{ github.event.inputs.url }}"
          echo "Fetching: $URL"

          # دانلود با curl و ذخیره headers
          if curl -L -w "\n%{http_code}\n%{content_type}\n%{size_download}\n%{url_effective}" \
               -o fetched/content.tmp \
               --max-time 300 \
               --fail \
               "$URL" > fetched/curl_info.txt 2>&1; then

            # خواندن اطلاعات curl
            HTTP_CODE=$(sed -n '2p' fetched/curl_info.txt)
            CONTENT_TYPE=$(sed -n '3p' fetched/curl_info.txt)
            SIZE=$(sed -n '4p' fetched/curl_info.txt)
            FINAL_URL=$(sed -n '5p' fetched/curl_info.txt)

            # استخراج نام فایل از URL
            FILENAME=$(basename "$FINAL_URL" | sed 's/[?#].*//')

            # اگر نام فایل خالی بود
            if [ -z "$FILENAME" ] || [ "$FILENAME" = "/" ]; then
              FILENAME=$(basename "$URL" | sed 's/[?#].*//')
            fi

            # تعیین extension بر اساس Content-Type
            if [ -z "$FILENAME" ] || [[ ! "$FILENAME" =~ \. ]]; then
              case "$CONTENT_TYPE" in
                *text/html*) EXT=".html" ;;
                *application/json*) EXT=".json" ;;
                *text/plain*) EXT=".txt" ;;
                *application/pdf*) EXT=".pdf" ;;
                *image/jpeg*) EXT=".jpg" ;;
                *image/png*) EXT=".png" ;;
                *application/zip*) EXT=".zip" ;;
                *application/java-archive*) EXT=".jar" ;;
                *) EXT=".bin" ;;
              esac

              if [ -z "$FILENAME" ]; then
                FILENAME="content${EXT}"
              else
                FILENAME="${FILENAME}${EXT}"
              fi
            fi

            # تغییر نام فایل موقت
            mv fetched/content.tmp "fetched/$FILENAME"

            # ذخیره metadata
            cat > fetched/metadata.txt << EOL
URL: $URL
Final URL: $FINAL_URL
Status: $HTTP_CODE
Content-Type: $CONTENT_TYPE
Size: $SIZE bytes
Filename: $FILENAME
EOL

            # ذخیره نام فایل
            echo "$FILENAME" > fetched/filename.txt

            echo "✓ Saved as: $FILENAME"
            echo "✓ Size: $SIZE bytes"

          else
            echo "✗ Failed to fetch URL"
            echo "Error fetching $URL" > fetched/error.txt
            cat fetched/curl_info.txt >> fetched/error.txt
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b ${{ github.event.inputs.branch_name }}
          git add fetched/
          git commit -m "Fetch: ${{ github.event.inputs.url }}"
          git push origin ${{ github.event.inputs.branch_name }}
