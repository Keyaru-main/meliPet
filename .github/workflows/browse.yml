name: Browse Page

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to browse'
        required: true
      branch_name:
        description: 'Temporary branch name'
        required: true
      mode:
        description: 'Mode: markdown, html, or full'
        required: false
        default: 'full'
      inline_images:
        description: 'Inline images (true/false)'
        required: false
        default: 'true'
      inline_videos:
        description: 'Inline videos (true/false)'
        required: false
        default: 'false'
      cloudflare_passer:
        description: 'Bypass Cloudflare (true/false)'
        required: false
        default: 'false'
      user_agent:
        description: 'Custom User-Agent'
        required: false
        default: ''
      timeout:
        description: 'Timeout in seconds'
        required: false
        default: '30'
      cookies:
        description: 'Cookies JSON string'
        required: false
        default: '{}'
      custom_headers:
        description: 'Custom headers JSON string'
        required: false
        default: '{}'

permissions:
  contents: write

jobs:
  browse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 markdownify lxml 2>/dev/null || true

      - name: Browse page
        run: |
          cat > browse.py << 'PYEOF'
          import json, base64, os, sys, time, urllib.parse
          
          try:
              from bs4 import BeautifulSoup
          except:
              BeautifulSoup = None
          try:
              from markdownify import markdownify as md
          except:
              md = None

          url = sys.argv[1]
          mode = sys.argv[2]
          inline_images = sys.argv[3] == "true"
          inline_videos = sys.argv[4] == "true"
          cloudflare_passer = sys.argv[5] == "true"
          user_agent = sys.argv[6]
          timeout = float(sys.argv[7])
          branch_name = sys.argv[8]
          cookies_str = sys.argv[9] if len(sys.argv) > 9 else "{}"
          headers_str = sys.argv[10] if len(sys.argv) > 10 else "{}"

          import requests
          session = requests.Session()

          headers = {"User-Agent": user_agent if user_agent else "Mozilla/5.0"}
          try:
              h = json.loads(headers_str)
              headers.update(h)
          except:
              pass

          try:
              c = json.loads(cookies_str)
              session.cookies.update(c)
          except:
              pass

          print(f"Fetching: {url}")
          resp = session.get(url, headers=headers, timeout=timeout)
          resp.raise_for_status()
          
          raw = resp.text
          final_url = resp.url
          resp_cookies = dict(resp.cookies)
          print(f"OK: {len(raw)} bytes")

          if mode == "markdown" and md:
              content = md(raw, heading_style="ATX", strip=["script", "style"])
          elif mode == "full" and BeautifulSoup:
              soup = BeautifulSoup(raw, "lxml")
              for img in soup.find_all("img"):
                  src = img.get("src","")
                  if inline_images and src and not src.startswith("data:"):
                      try:
                          r = session.get(urllib.parse.urljoin(final_url, src), timeout=10)
                          if r.ok:
                              ct = r.headers.get("Content-Type","image/jpeg").split(";")[0]
                              img["src"] = f"data:{ct};base64,{base64.b64encode(r.content).decode()}"
                      except: pass
              content = str(soup)
          else:
              content = raw

          os.makedirs("output", exist_ok=True)
          ext = "md" if mode == "markdown" else "html"
          with open(f"output/content.{ext}", "w", encoding="utf-8") as f:
              f.write(content)
          json.dump({"url": final_url, "mode": mode, "size": len(content)}, open("output/metadata.json","w"))
          json.dump(resp_cookies, open("output/cookies.json","w"))
          print(f"Saved: output/content.{ext}")
          PYEOF

          python3 browse.py \
            "${{ github.event.inputs.url }}" \
            "${{ github.event.inputs.mode }}" \
            "${{ github.event.inputs.inline_images }}" \
            "${{ github.event.inputs.inline_videos }}" \
            "${{ github.event.inputs.cloudflare_passer }}" \
            "${{ github.event.inputs.user_agent }}" \
            "${{ github.event.inputs.timeout }}" \
            "${{ github.event.inputs.branch_name }}" \
            '${{ github.event.inputs.cookies }}' \
            '${{ github.event.inputs.custom_headers }}'

      - name: Commit and push result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b ${{ github.event.inputs.branch_name }}
          git add output/
          git commit -m "Browse: ${{ github.event.inputs.url }}" || echo "No changes"
          git push origin ${{ github.event.inputs.branch_name }}
          echo "✅ Branch: ${{ github.event.inputs.branch_name }}"
